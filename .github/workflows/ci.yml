# =============================================================================
# CI/CD Pipeline — The Yard
# =============================================================================
# Triggers on push/PR to main. On push to main, also builds a Docker image,
# pushes it to GHCR, and deploys to the home server via SSH.
#
# --- Server Setup Checklist (manual, one-time) ---
#
# On your home server:
#   1. Install Docker & Docker Compose
#   2. Create the app directory: mkdir -p ~/the-yard
#   3. Copy docker/docker-compose.yml → ~/the-yard/docker-compose.yml
#   4. Create ~/the-yard/.env with production env vars (see .env.example)
#   5. Create a GitHub PAT (classic) with read:packages scope
#   6. Run: echo <PAT> | docker login ghcr.io -u <github-username> --password-stdin
#   7. Ensure SSH is accessible (openssh-server, key-based auth)
#
# On GitHub (repo Settings):
#   1. Create a "production" environment (Settings → Environments → New)
#   2. Add repository secrets (Settings → Secrets → Actions):
#      - DEPLOY_HOST  — server's public IP or DDNS hostname
#      - DEPLOY_USER  — SSH username
#      - DEPLOY_SSH_KEY — private SSH key (dedicated; ssh-keygen -t ed25519)
#      - DEPLOY_PORT  — SSH port (only needed if not 22)
#      - DEPLOY_PATH  — path to app dir (e.g. ~/the-yard)
#
# Networking:
#   - Port-forward SSH (22 or custom) on your router → server
#   - Port-forward 3000, or use a reverse proxy (Caddy/nginx) for HTTPS
#   - Consider DDNS if you don't have a static IP
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          DEPLOYMENT_MODE: hosted

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Home Server
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ${{ secrets.DEPLOY_PATH || '~/the-yard' }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for container to start..."
          sleep 10
          for i in $(seq 1 6); do
            if curl -sf --max-time 5 "http://${{ secrets.DEPLOY_HOST }}:3000/api/health"; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/6 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 6 attempts"
          exit 1
